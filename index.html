<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডাঃ জসিম মুকুল হসপিটাল - কাউন্টার বিলিং</title>
    <!-- Tailwind CSS (ডিজাইন সুন্দর ও মোবাইল রেসপনসিভ করার জন্য) -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">

    <!-- হেডার বা নাম -->
    <header class="bg-blue-600 text-white text-center py-4 shadow-md">
        <h1 class="text-xl md:text-2xl font-bold">ডাঃ জসিম মুকুল হসপিটাল & ডায়াগনস্টিক সেন্টার</h1>
        <p class="text-sm opacity-90">লাইভ কাউন্টার বিলিং ও হিসাব ম্যানেজমেন্ট</p>
    </header>

    <!-- মূল কন্টেন্ট (মোবাইলে এক কলাম, পিসিতে দুই কলাম দেখাবে) -->
    <main class="flex-1 p-4 max-w-6xl w-full mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- বাম পাশ: নতুন বিল তৈরি করার ফর্ম -->
        <div class="bg-white p-5 rounded-lg shadow border border-gray-200">
            <h2 class="text-lg font-bold text-blue-600 mb-4 border-b pb-2">📋 নতুন ক্যাশ মেমো / বিল</h2>
            
            <form id="billingForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">রোগীর নাম:</label>
                    <input type="text" id="pName" placeholder="উদা: আবুল কাসেম" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">মোবাইল নম্বর:</label>
                    <input type="tel" id="pPhone" placeholder="017XXXXXXXX" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">ডাক্তার ফি (টাকা):</label>
                        <input type="number" id="docFee" value="0" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">ল্যাব/টেস্ট ফি (টাকা):</label>
                        <input type="number" id="labFee" value="0" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">ডিসকাউন্ট/ছাড় (টাকা):</label>
                        <input type="number" id="discount" value="0" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">নগদ পরিশোধ (টাকা):</label>
                        <input type="number" id="paid" value="0" class="w-full border p-2 rounded focus:ring focus:ring-blue-200 outline-none" required>
                    </div>
                </div>
                <button type="button" onclick="calculateBill()" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700 transition">💾 বিল সেভ করুন</button>
            </form>
        </div>

        <!-- ডান পাশ: লাইভ হিসাব ও আজকের রিপোর্ট -->
        <div class="bg-white p-5 rounded-lg shadow border border-gray-200 flex flex-col">
            <h2 class="text-lg font-bold text-green-600 mb-4 border-b pb-2">📊 আজকের লাইভ ক্যাশ রিপোর্ট</h2>
            
            <!-- মোট কালেকশন কার্ডসমূহ -->
            <div class="grid grid-cols-3 gap-2 text-center mb-6">
                <div class="bg-green-50 p-2 rounded border border-green-200">
                    <span class="block text-xs font-semibold text-gray-500">মোট বিল</span>
                    <span id="statTotal" class="text-lg font-bold text-green-700">০ ৳</span>
                </div>
                <div class="bg-blue-50 p-2 rounded border border-blue-200">
                    <span class="block text-xs font-semibold text-gray-500">মোট ক্যাশ</span>
                    <span id="statPaid" class="text-lg font-bold text-blue-700">০ ৳</span>
                </div>
                <div class="bg-red-50 p-2 rounded border border-red-200">
                    <span class="block text-xs font-semibold text-gray-500">মোট বকেয়া</span>
                    <span id="statDue" class="text-lg font-bold text-red-700">০ ৳</span>
                </div>
            </div>

            <!-- সাম্প্রতিক মেমো সমূহের তালিকা -->
            <h3 class="text-sm font-bold text-gray-600 mb-2">📜 সাম্প্রতিক মেমো তালিকা:</h3>
            <div class="flex-1 overflow-y-auto max-h-60 border rounded p-2 bg-gray-50 space-y-2" id="invoiceList">
                <p class="text-gray-400 text-xs text-center py-4">এখনো কোনো বিল তৈরি করা হয়নি।</p>
            </div>
        </div>

    </main>

    <!-- ফুটার -->
    <footer class="bg-gray-800 text-white text-center py-2 text-xs">
        &copy; ২০২৬ ডাঃ জসিম মুকুল হসপিটাল। অল রাইটস রিজার্ভড।
    </footer>

    <!-- লজিক স্ক্রিপ্ট (হিসাব স্বয়ংক্রিয়ভাবে করার জন্য) -->
    <script>
        let totalBillSum = 0;
        let totalPaidSum = 0;
        let totalDueSum = 0;

        function calculateBill() {
            let name = document.getElementById('pName').value;
            let phone = document.getElementById('pPhone').value;
            let docFee = parseFloat(document.getElementById('docFee').value) || 0;
            let labFee = parseFloat(document.getElementById('labFee').value) || 0;
            let discount = parseFloat(document.getElementById('discount').value) || 0;
            let paid = parseFloat(document.getElementById('paid').value) || 0;

            if(!name || !phone) {
                alert("দয়া করে রোগীর নাম এবং মোবাইল নম্বর সঠিকভাবে দিন।");
                return;
            }

            let total = (docFee + labFee) - discount;
            let due = total - paid;
            if(due < 0) due = 0;

            // লাইভ ক্যালকুলেশন আপডেট
            totalBillSum += total;
            totalPaidSum += paid;
            totalDueSum += due;

            document.getElementById('statTotal').innerText = totalBillSum + " ৳";
            document.getElementById('statPaid').innerText = totalPaidSum + " ৳";
            document.getElementById('statDue').innerText = totalDueSum + " ৳";

            // মেমো লিস্টে যোগ করা
            let invoiceList = document.getElementById('invoiceList');
            if(totalBillSum === total) invoiceList.innerHTML = ''; // প্রথম বিলের সময় খালি করা
            
            let item = document.createElement('div');
            item.className = "bg-white p-2 rounded shadow-sm border text-xs flex justify-between items-center";
            item.innerHTML = `
                <div>
                    <span class="font-bold text-gray-700">${name} (${phone})</span>
                    <span class="block text-gray-400 text-[10px]">${new Date().toLocaleTimeString('bn-BD')}</span>
                </div>
                <div class="text-right">
                    <span class="block font-bold text-green-600">বিল: ${total} ৳</span>
                    <span class="block text-red-500">বাকি: ${due} ৳</span>
                </div>
            `;
            invoiceList.prepend(item);

            // ফর্ম রিসেট করা
            document.getElementById('billingForm').reset();
        </div>
    </script>
</body>
</html>
